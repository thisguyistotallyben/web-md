<div class="editor-container">
  <div class="editor-header">
    <div class="note-info">
      <span *ngIf="!isRenaming()" class="note-title" (click)="startRename()">{{ displayFileName() }}</span>
      <input 
        #renameInput
        *ngIf="isRenaming()" 
        class="rename-input" 
        [value]="displayFileName()" 
        (blur)="finishRename(renameInput.value)"
        (keydown)="handleRenameKeydown($event, renameInput)"
        autofocus>
      <span class="save-indicator" [class.visible]="isSaving()">Saving...</span>
    </div>

    <div class="actions" *ngIf="activeFilePath()">
      <button class="action-menu-btn" (click)="isActionMenuOpen.set(!isActionMenuOpen())" [class.active]="isActionMenuOpen()">
        <fa-icon [icon]="faEllipsisV"></fa-icon>
      </button>

      <!-- Action Menu Popup -->
      <div class="action-popup" *ngIf="isActionMenuOpen()">
        <button class="delete-btn" (click)="deleteActiveNote()">
          <fa-icon [icon]="faTrash"></fa-icon>
          Delete Note
        </button>
      </div>
    </div>
  </div>

  <div class="editor-body">
    <tiptap-editor [editor]="editor"></tiptap-editor>
  </div>
</div>
