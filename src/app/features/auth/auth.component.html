<div class="auth-container">
  <div class="auth-card">
    <div class="logo-section">
      <span class="logo"><span class="brand-web">Web</span>MD</span>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Please sign in to access your notes</p>

    <form (submit)="onLogin(); $event.preventDefault()">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrapper">
          <fa-icon [icon]="faUser" class="input-icon"></fa-icon>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="admin"
            required
            autofocus>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <fa-icon [icon]="faLock" class="input-icon"></fa-icon>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required>
        </div>
      </div>

      @if (error()) {
        <div class="error-message">
          {{ error() }}
        </div>
      }

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
