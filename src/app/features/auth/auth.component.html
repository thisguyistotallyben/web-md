<div class="auth-container">
  <div class="auth-card">
    <div class="logo-section">
      <span class="logo"><span class="brand-web">Web</span>MD</span>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your password to access your notes</p>

    <form (submit)="onLogin(); $event.preventDefault()">
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <fa-icon [icon]="faLock" class="input-icon"></fa-icon>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autofocus>
        </div>
      </div>

      @if (error()) {
        <div class="error-message">
          {{ error() }}
        </div>
      }

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
