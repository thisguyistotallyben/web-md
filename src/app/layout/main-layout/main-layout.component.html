<div class="layout-container" [class.sidebar-collapsed]="isSidebarCollapsed()">
  <aside class="sidebar-wrapper">
    <app-sidebar></app-sidebar>
  </aside>

  <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="isSidebarCollapsed() ? 'Expand Sidebar' : 'Collapse Sidebar'">
    <fa-icon [icon]="isSidebarCollapsed() ? faBars : faChevronLeft"></fa-icon>
  </button>

  <main class="main-content">
    <app-editor></app-editor>
  </main>

  <!-- Server Offline Overlay -->
  <div class="system-overlay" *ngIf="!systemService.isServerOnline()">
    <div class="overlay-card">
      <fa-icon [icon]="faExclamationTriangle" class="warning-icon"></fa-icon>
      <h3>Server Offline</h3>
      <p>Connection lost. Attempting to reconnect...</p>
    </div>
  </div>

  <!-- Global Creation Modal -->
  <div class="modal-backdrop" *ngIf="modalService.isOpen()" (click)="modalService.close()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <div class="modal-header">{{ modalService.config()?.title }}</div>
      <div class="modal-body">
        <input 
          #modalInput
          type="text" 
          [ngModel]="modalService.config()?.value" 
          (ngModelChange)="modalValue.set($event)"
          [placeholder]="modalService.config()?.placeholder || ''" 
          (keydown.enter)="confirm()"
          (keydown.escape)="modalService.close()"
          autofocus>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" (click)="modalService.close()">Cancel</button>
        <button class="confirm-btn" (click)="confirm()" [disabled]="!modalValue().trim()">Create</button>
      </div>
    </div>
  </div>
</div>
